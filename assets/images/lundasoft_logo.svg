<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160">
  <defs>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a8095" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2aaabf" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="treeCenter" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a4b30"/>
      <stop offset="100%" stop-color="#26623e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="160" fill="#f0f0ea"/>

  <!-- ── ICON ── -->
  <g transform="translate(18, 10)">

    <!-- Mountains (behind trees) -->
    <polygon points="20,102 52,50 72,76 92,46 124,102" fill="#9ab5c5"/>

    <!-- Left tree (medium) -->
    <polygon points="10,106 44,32 78,106" fill="#2d6b42"/>
    <!-- Left tree lightning bolt -->
    <path d="M44,46 L36,70 L49,66 L41,90"
          stroke="white" stroke-width="2.8" fill="none"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

    <!-- Center tree (tallest, dominant) -->
    <polygon points="46,106 82,8 118,106" fill="url(#treeCenter)"/>
    <!-- Center tree lightning bolt -->
    <path d="M82,22 L71,52 L86,47 L75,78"
          stroke="white" stroke-width="3.6" fill="none"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

    <!-- Right tree (small) -->
    <polygon points="94,106 112,62 130,106" fill="#3c7d50"/>

    <!-- Water reflection -->
    <rect x="6" y="106" width="130" height="34" fill="url(#waterGrad)" rx="2"/>
    <!-- Horizontal water lines -->
    <line x1="8"  y1="113" x2="134" y2="113" stroke="#1a7a90" stroke-width="2.4" opacity="0.42"/>
    <line x1="15" y1="121" x2="127" y2="121" stroke="#1a7a90" stroke-width="1.9" opacity="0.30"/>
    <line x1="24" y1="129" x2="118" y2="129" stroke="#1a7a90" stroke-width="1.4" opacity="0.20"/>

    <!-- Faint tree reflections in water -->
    <polygon points="46,106 60,130 74,106" fill="#2d6b42" opacity="0.12"/>
    <polygon points="64,106 82,140 100,106" fill="#1a4b30" opacity="0.14"/>
    <polygon points="100,106 112,122 124,106" fill="#3c7d50" opacity="0.11"/>
  </g>

  <!-- ── LOGO TEXT ── -->
  <!-- LUNDA (heavy) + SOFT (light) -->
  <text y="98" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="56" fill="#1c3d28">
    <tspan x="182" font-weight="900" letter-spacing="1">LUNDA</tspan><tspan font-weight="300"
        font-family="'Helvetica Neue', Arial, sans-serif" letter-spacing="2">SOFT</tspan>
  </text>

  <!-- Tagline -->
  <text x="182" y="122"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="12" font-weight="500"
        fill="#2a90a8" letter-spacing="3.4">NORDIC TECHNOLOGY | SOFTWARE SOLUTIONS</text>
</svg>